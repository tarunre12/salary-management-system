version: '3.8'

services:
  backend:
    image: ${DOCKER_USERNAME}/salary-backend:latest
    container_name: salary-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=http://${EC2_PUBLIC_IP}
    networks:
      - salary-network

  frontend:
    image: ${DOCKER_USERNAME}/salary-frontend:latest
    container_name: salary-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - salary-network

networks:
  salary-network:
    driver: bridge
